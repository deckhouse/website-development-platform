configVersion: 1
project: deckhouse-web-development-platform
---

image: web-artifacts
fromImage: ghcr.io/gohugoio/hugo:v0.159.2
final: false
shell:
  setup:
  - hugo -s /src -d /out --minify --enableGitInfo=false
git:
- add: /
  to: /src
  includePaths:
    - config/
    - content
    - go.*
  stageDependencies:
    setup: ['**/*']
---
image: web
fromImage: nginx:1.29.3-alpine
import:
- image: web-artifacts
  add: /out
  to: /app
  before: setup
